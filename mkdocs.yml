site_name: SwarmCity
site_description: Minimal, git-native, markdown-first agent orchestration for multi-repo organizations.
site_url: https://mikehlee.github.io/SwarmCity/
repo_url: https://github.com/MikeHLee/SwarmCity
repo_name: MikeHLee/SwarmCity
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Getting Started:
      - Platform Setup: PLATFORM_SETUP.md
      - Drift Check: DRIFT_CHECK_SETUP.md
  - Reference:
      - CLI Reference: CLI_REFERENCE.md
      - Architecture & Internals: ARCHITECTURE.md
  - Credits & Inspiration: CREDITS.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
