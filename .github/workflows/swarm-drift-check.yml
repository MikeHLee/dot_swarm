# SwarmCity Drift Check
# ---------------------
# On merge to dev/prod (push) or open/update of a PR targeting dev/prod,
# diffs changed source files against .swarm/ state and queue, then posts
# an AI assessment via AWS Bedrock (Claude 3.5 Haiku — cheapest + fast).
#
# Required secrets (likely already set from deploy workflows):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_DEFAULT_REGION   (e.g. us-east-1)
#
# Optional:
#   SWARM_BEDROCK_MODEL  (default: amazon.nova-micro-v1:0)
#
# Setup: run `swarm setup-drift-check` in any division repo, or copy this
# file manually and commit it to .github/workflows/.
# Bedrock model access must be enabled in your AWS account:
#   AWS Console → Bedrock → Model access → enable Claude 3.5 Haiku

name: SwarmCity Drift Check

on:
  push:
    branches: [dev, prod]
  pull_request:
    branches: [dev, prod]
    types: [opened, synchronize, reopened]

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for accurate diffs

      # ------------------------------------------------------------------ #
      # 1. Collect diff — token-efficient: stat + per-file for source only  #
      # ------------------------------------------------------------------ #
      - name: Collect diff and swarm state
        id: collect
        run: |
          python3 - << 'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path

          # --- Determine base commit ----------------------------------------
          event = os.environ.get("GITHUB_EVENT_NAME", "push")
          if event == "pull_request":
              base = os.environ.get("PR_BASE_SHA", "")
          else:
              base = os.environ.get("PUSH_BEFORE", "")

          # Fallback for first push / force push (before = 000...0)
          if not base or base == "0" * 40:
              base = subprocess.run(
                  ["git", "rev-parse", "HEAD~1"],
                  capture_output=True, text=True
              ).stdout.strip() or "HEAD~1"

          head = "HEAD"
          ref = f"{base}...{head}"

          def run(cmd):
              return subprocess.run(cmd, capture_output=True, text=True).stdout

          # --- Compact stat overview (all files) ----------------------------
          stat = run(["git", "diff", "--stat", ref]).strip()

          # --- Changed source files (filter noise) --------------------------
          NOISE = {
              "lock", ".snap", "dist/", "build/", ".min.", ".pyc",
              "__pycache__", "coverage", ".generated.", "/vendor/",
          }
          SOURCE_EXTS = {
              ".py", ".ts", ".tsx", ".js", ".mjs", ".rs", ".go",
              ".tf", ".yaml", ".yml", ".sh",
          }

          changed_all = run(["git", "diff", "--name-only", ref]).strip().splitlines()
          source_files = [
              f for f in changed_all
              if Path(f).suffix in SOURCE_EXTS
              and not any(n in f for n in NOISE)
          ]

          # --- Per-file diffs (top 6 files, max 700 chars each) -------------
          # Sort by number of changed lines descending (most changed first)
          def line_count(f):
              out = run(["git", "diff", "--numstat", ref, "--", f])
              parts = out.strip().split()
              return int(parts[0]) + int(parts[1]) if len(parts) >= 2 else 0

          ranked = sorted(source_files, key=line_count, reverse=True)[:6]

          file_sections = []
          for f in ranked:
              diff = run(["git", "diff", ref, "--", f])[:700]
              if diff.strip():
                  file_sections.append(f"### {f}\n```diff\n{diff.rstrip()}\n```")

          diff_content = "\n\n".join(file_sections) if file_sections else "(no source changes)"

          # --- .swarm state (active queue items + state only) ---------------
          state_md = Path(".swarm/state.md").read_text()[:800] if Path(".swarm/state.md").exists() else "(no state.md)"

          # Queue: active section only (most relevant, smallest)
          queue_raw = Path(".swarm/queue.md").read_text() if Path(".swarm/queue.md").exists() else ""
          active_start = queue_raw.find("## Active")
          pending_start = queue_raw.find("## Pending")
          if active_start >= 0 and pending_start > active_start:
              queue_active = queue_raw[active_start:pending_start].strip()[:800]
          elif active_start >= 0:
              queue_active = queue_raw[active_start:active_start + 800]
          else:
              queue_active = queue_raw[:800]

          # --- Write collected context to files for next step ---------------
          os.makedirs("/tmp/swarm", exist_ok=True)
          Path("/tmp/swarm/stat.txt").write_text(stat)
          Path("/tmp/swarm/diff.txt").write_text(diff_content)
          Path("/tmp/swarm/state.txt").write_text(state_md)
          Path("/tmp/swarm/queue_active.txt").write_text(queue_active)
          Path("/tmp/swarm/changed_files.txt").write_text("\n".join(changed_all))

          print(f"Base: {base}")
          print(f"Changed files: {len(changed_all)} total, {len(source_files)} source")
          print(f"Files in diff: {ranked}")
          PYEOF
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}

      # ------------------------------------------------------------------ #
      # 2. Call Bedrock (Claude 3.5 Haiku) — no pip install needed          #
      # ------------------------------------------------------------------ #
      - name: SwarmCity drift assessment via Bedrock
        id: assess
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          SWARM_BEDROCK_MODEL: ${{ vars.SWARM_BEDROCK_MODEL || 'amazon.nova-micro-v1:0' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - << 'PYEOF'
          import json, os, subprocess, sys, tempfile, textwrap
          from pathlib import Path

          model  = os.environ["SWARM_BEDROCK_MODEL"]
          repo   = os.environ["GITHUB_REPOSITORY"]
          branch = os.environ["GITHUB_REF_NAME"]
          event  = os.environ["GITHUB_EVENT_NAME"]

          stat         = Path("/tmp/swarm/stat.txt").read_text().strip()
          diff_content = Path("/tmp/swarm/diff.txt").read_text().strip()
          state_md     = Path("/tmp/swarm/state.txt").read_text().strip()
          queue_active = Path("/tmp/swarm/queue_active.txt").read_text().strip()

          prompt = textwrap.dedent(f"""
              You are a SwarmCity drift auditor. SwarmCity uses `.swarm/state.md` and
              `.swarm/queue.md` to coordinate AI agents and developers across repos.
              A "merge" just landed on `{branch}` in `{repo}`.

              Your job: identify any drift between the code changes and the coordination
              docs. Be concise.

              ## Diff stat
              ```
              {stat}
              ```

              ## Source file diffs (top changed files, truncated)
              {diff_content}

              ## .swarm/state.md (current)
              ```
              {state_md}
              ```

              ## .swarm/queue.md — Active section
              ```
              {queue_active}
              ```

              ## Your assessment

              Check these four things only:
              1. **State sync** — Does `state.md` "Current focus" match what was just merged?
              2. **Queue sync** — Should any active/pending items be marked DONE or CLAIMED?
              3. **Missing items** — Any TODOs or incomplete work in the diff that should be queued?
              4. **Memory gap** — Any non-obvious architectural decision warranting a `memory.md` entry?

              Respond in GitHub-flavored markdown. Reference specific file names and queue IDs.
              If everything looks good, say so in one sentence. Max 250 words.
          """).strip()

          payload = {
              "anthropic_version": "bedrock-2023-05-31",
              "max_tokens": 500,
              "temperature": 0.15,
              "messages": [{"role": "user", "content": prompt}],
          }

          with tempfile.NamedTemporaryFile(mode="w", suffix=".json", delete=False) as f:
              json.dump(payload, f)
              payload_path = f.name

          result = subprocess.run(
              [
                  "aws", "bedrock-runtime", "invoke-model",
                  "--model-id", model,
                  "--content-type", "application/json",
                  "--accept", "application/json",
                  "--body", f"fileb://{payload_path}",
                  "/tmp/swarm/bedrock_response.json",
              ],
              capture_output=True, text=True,
          )

          if result.returncode != 0:
              err = result.stderr[:400]
              print(f"Bedrock error:\n{err}", file=sys.stderr)
              assessment = (
                  f"⚠️ Bedrock invocation failed — check AWS credentials and model access.\n\n"
                  f"```\n{err}\n```\n\n"
                  f"Enable model access: AWS Console → Bedrock → Model access → Amazon Nova Micro"
              )
          else:
              resp = json.loads(Path("/tmp/swarm/bedrock_response.json").read_text())
              assessment = resp["content"][0]["text"]

          trigger = "PR" if event == "pull_request" else f"push to `{branch}`"
          out = (
              f"## SwarmCity Drift Check\n\n"
              f"_{trigger} · {repo} · model: `{model}`_\n\n"
              f"{assessment}\n\n"
              f"---\n"
              f"*[SwarmCity](https://github.com/MikeHLee/swarm-city) · "
              f"update `.swarm/` files to resolve drift*"
          )
          Path("/tmp/swarm/assessment.md").write_text(out)
          print(assessment[:200])
          PYEOF

      # ------------------------------------------------------------------ #
      # 3a. Post / update PR comment                                        #
      # ------------------------------------------------------------------ #
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/swarm/assessment.md', 'utf8');
            const marker = '## SwarmCity Drift Check';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      # ------------------------------------------------------------------ #
      # 3b. Job summary on push (post-merge) events                         #
      # ------------------------------------------------------------------ #
      - name: Write job summary
        if: github.event_name == 'push'
        run: cat /tmp/swarm/assessment.md >> "$GITHUB_STEP_SUMMARY"
